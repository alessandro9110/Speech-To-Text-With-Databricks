# NLP analysis pipeline for speech_to_text_asset_bundle.
# Reads silver_audio_transcription produced by stt_audio_ingestion and
# enriches every transcription record with Databricks AI SQL functions
# (sentiment, summarization, entity extraction, topic classification).
# This pipeline is intentionally decoupled from the ingestion pipeline
# so that each can be deployed, scaled and scheduled independently.

resources:
  pipelines:
    stt_nlp_analysis:
      name: stt_nlp_analysis
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true

      # Pipeline-level parameters accessible via spark.conf.get() in Python transformations
      configuration:
        catalog: ${var.catalog}
        schema: ${var.schema}

      libraries:
        - glob:
            include: ../src/stt_nlp_analysis/transformations/**
